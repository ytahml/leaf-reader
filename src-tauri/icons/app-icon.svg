<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- 温暖的纸张背景渐变 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf6f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8df;stop-opacity:1" />
    </linearGradient>
    <!-- 叶子渐变 -->
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c59;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a3f;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影效果 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- 装饰性纸张纹理线条 -->
  <line x1="200" y1="300" x2="824" y2="300" stroke="#e5ddd4" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="400" x2="824" y2="400" stroke="#e5ddd4" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="500" x2="824" y2="500" stroke="#e5ddd4" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="600" x2="824" y2="600" stroke="#e5ddd4" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="700" x2="824" y2="700" stroke="#e5ddd4" stroke-width="1" opacity="0.5"/>

  <!-- 主叶子图标 - 居中放大 -->
  <g transform="translate(512, 480) scale(12)" filter="url(#shadow)">
    <!-- 叶子主体 -->
    <path
      d="M0 -20C0 -20 -12 -8 -12 0C-12 6 -8 14 0 20C8 14 12 6 12 0C12 -8 0 -20 0 -20Z"
      fill="url(#leaf)"
      stroke="#2d5a3f"
      stroke-width="0.8"
    />
    <!-- 叶子中脉 -->
    <line x1="0" y1="-12" x2="0" y2="16" stroke="#f0e8df" stroke-width="0.6" opacity="0.6"/>
    <!-- 叶子侧脉 -->
    <path d="M0 -4C4 -8 8 -7 8 -7" stroke="#f0e8df" stroke-width="0.4" opacity="0.4" fill="none"/>
    <path d="M0 2C-4 -2 -8 -1 -8 -1" stroke="#f0e8df" stroke-width="0.4" opacity="0.4" fill="none"/>
    <path d="M0 8C4 4 8 5 8 5" stroke="#f0e8df" stroke-width="0.4" opacity="0.4" fill="none"/>
  </g>

  <!-- 应用名称文字 -->
  <text x="512" y="750" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#4a7c59" text-anchor="middle" letter-spacing="8">
    LEAF
  </text>

  <!-- 副标题 -->
  <text x="512" y="810" font-family="Georgia, serif" font-size="28" fill="#8b7d6b" text-anchor="middle" letter-spacing="4">
    Markdown Reader
  </text>
</svg>
